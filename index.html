<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nature's Symphony | Eco-Cyber Experience</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#020d08] text-emerald-50 min-h-screen overflow-x-hidden font-['Outfit']">

    <!-- Ambient Background Elements -->
    <div class="fixed inset-0 -z-10">
        <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] rounded-full bg-emerald-900/20 blur-[120px] animate-pulse"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-teal-900/20 blur-[120px] animate-pulse" style="animation-delay: 2s;"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-full bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-emerald-500/5 via-transparent to-transparent"></div>
    </div>

    <!-- Navigation Bar -->
    <nav class="fixed top-0 w-full z-50 border-b border-white/10 backdrop-blur-xl bg-black/20">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="text-2xl font-bold tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-teal-300">
                NATURE'S SYMPHONY
            </div>
            
            <!-- Desktop Menu -->
            <div class="hidden md:flex space-x-8 text-sm font-medium uppercase tracking-widest">
                <a href="#" data-page="home" class="nav-link text-emerald-400">Home</a>
                <a href="#" data-page="gallery" class="nav-link hover:text-emerald-400 transition">Gallery</a>
                <a href="#" data-page="blogs" class="nav-link hover:text-emerald-400 transition">Blogs</a>
                <a href="#" data-page="literacy" class="nav-link hover:text-emerald-400 transition">Nature Literacy</a>
                <a href="#" data-page="about" class="nav-link hover:text-emerald-400 transition">About</a>
                <a href="#" data-page="others" class="nav-link hover:text-emerald-400 transition">Others</a>
            </div>

            <!-- Mobile Toggle (Simplified) -->
            <button class="md:hidden text-emerald-400">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
                </svg>
            </button>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main id="app-viewport" class="pt-32 pb-20 max-w-7xl mx-auto px-6">
        <!-- JS Renders Content Here -->
        <div id="page-header" class="mb-12">
            <h1 class="text-5xl font-light mb-4">Welcome to the <span class="font-semibold italic">Eco-Digital Ark</span></h1>
            <p class="text-emerald-400/60 max-w-2xl text-lg">Exploring the intersection of biological beauty and futuristic technology.</p>
        </div>

        <div id="content-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Glass Cards injected by JS -->
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
